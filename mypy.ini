[mypy]
# check_untyped_defs: prueft auch Funktionskoerper ohne Typannotationen
# (z.B. def run_cycle(self):). Ohne diese Option ignoriert mypy solche
# Funktionen komplett -- der TypeError-Bug in v3.0.13.5 (datetime - None
# in run_cycle) waere sonst unentdeckt geblieben.
check_untyped_defs = True

# Fehlende Stubs fuer Drittanbieter-Pakete nicht als harten Fehler werten.
[mypy-requests.*]
ignore_missing_imports = True

[mypy-pymodbus.*]
ignore_missing_imports = True
